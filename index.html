<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reel Thoughts &mdash; 나의 영화 기록장</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-icon">&#127909;</span>
        <div>
          <h1>Reel Thoughts</h1>
          <p class="header-sub">나만의 영화 기록장</p>
        </div>
      </div>
      <div class="header-controls">
        <button class="btn-sort active" id="sortDate">날짜순 ↓</button>
        <button class="btn-sort" id="sortRating">별점순 ↓</button>
        <button class="btn-primary" id="openFormBtn">+ 영화 추가</button>
      </div>
    </div>
  </header>

  <!-- Filter Bar -->
  <section class="filter-bar">
    <div class="filter-inner">
      <span class="filter-label">장르별 보기:</span>
      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-genre="All">전체</button>
      </div>
    </div>
  </section>

  <!-- Movie Grid -->
  <main class="main-content">
    <div class="movie-grid" id="movieGrid">
      <!-- Cards injected by JS -->
    </div>
    <p class="empty-state" id="emptyState" style="display:none;">
      등록된 영화가 없어요. 첫 번째 영화를 추가해보세요!
    </p>
  </main>

  <!-- Add Movie Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>영화 추가</h2>
        <button class="modal-close" id="closeFormBtn" aria-label="Close">&times;</button>
      </div>
      <form id="movieForm" novalidate>

        <div class="form-group">
          <label for="titleInput">제목 <span class="req">*</span></label>
          <input type="text" id="titleInput" placeholder="예: 기생충" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="yearInput">연도 <span class="req">*</span></label>
            <input type="number" id="yearInput" placeholder="2024" min="1888" max="2099" required />
          </div>
          <div class="form-group">
            <label for="genreInput">장르 <span class="req">*</span></label>
            <select id="genreInput" required>
              <option value="">장르 선택</option>
              <option>드라마</option>
              <option>코미디</option>
              <option>스릴러</option>
              <option>호러</option>
              <option>히어로</option>
              <option>로맨스</option>
              <option>액션</option>
              <option>SF</option>
              <option>애니메이션</option>
              <option>다큐멘터리</option>
              <option>미스터리</option>
              <option>판타지</option>
              <option>추리</option>
              <option>기타</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="posterInput">포스터 URL <span class="optional">(선택)</span></label>
          <input type="url" id="posterInput" placeholder="https://..." />
        </div>

        <div class="form-group">
          <label>별점 <span class="req">*</span></label>
          <div class="star-picker" id="starPicker" role="group" aria-label="Star rating">
            <span class="star-pick" data-value="1">&#9733;</span>
            <span class="star-pick" data-value="2">&#9733;</span>
            <span class="star-pick" data-value="3">&#9733;</span>
            <span class="star-pick" data-value="4">&#9733;</span>
            <span class="star-pick" data-value="5">&#9733;</span>
          </div>
          <input type="hidden" id="ratingInput" value="0" />
        </div>

        <div class="form-group">
          <label for="reviewInput">한줄평 <span class="req">*</span></label>
          <textarea id="reviewInput" rows="3" placeholder="영화 감상을 짧게 적어주세요" required></textarea>
        </div>

        <p class="form-error" id="formError"></p>

        <div class="form-actions">
          <button type="button" class="btn-ghost" id="cancelFormBtn">취소</button>
          <button type="submit" class="btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="site-footer">
    <p>Reel Thoughts &mdash; 영화를 사랑하는 이들의 아늑한 공간</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
